# Minimal local testing setup - just miden-node and proxy
# No external dependencies (postgres, bridge-service, l1-anvil)

services:
  # Miden node (agglayer-v0.1 - built from source)
  # Image tag uses miden-node repo commit SHA, not proxy repo
  miden-node:
    image: miden-infra/miden-node:${MIDEN_NODE_COMMIT:-agglayer-v0.1}
    build:
      context: .
      dockerfile: Dockerfile.miden-node
    ports:
      - "${NODE_PORT:-57291}:57291"
    volumes:
      - miden_node_data:/data
      - miden_node_accounts:/accounts
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 57291 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # The proxy service (minimal config for decode testing)
  proxy:
    image: miden-infra/miden-proxy:${GIT_COMMIT:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    environment:
      RUST_LOG: info
      MIDEN_RPC_URL: http://miden-node:57291
      # BRIDGE_FAUCET_ID is used for deterministic seed derivation only
      # The actual agglayer faucet is created locally at runtime
      BRIDGE_FAUCET_ID: ${BRIDGE_FAUCET_ID:-0x000000000000000000000000000001}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "${PROXY_PORT:-8546}:8546"
    volumes:
      - ./config/config.docker.toml:/app/config.toml:ro
    depends_on:
      miden-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8546/"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s

volumes:
  miden_node_data:
  miden_node_accounts:

networks:
  default:
    name: miden-proxy-local-network
