<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miden x AggLayer Bridge</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="layout-grid">
    <!-- Visual Skeleton -->
    <div class="grid-lines">
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
    </div>

    <!-- Header / Port -->
    <header class="header">
      <div class="logo-block" style="display: flex; align-items: center; gap: 24px;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" fill="#0F0F0F" />
            <path d="M8 22V10l8 6 8-6v12" stroke="#F2EFE9" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
          <span class="text-mono" style="font-size: 13px;">MIDEN x AGGLAYER</span>
        </div>

        <!-- Gateway.fm Badge (Header Version) -->
        <div class="gateway-badge"
          style="margin-left: 0; padding-left: 24px; border-left: 1px solid var(--c-aluminum); height: 24px; display: flex; align-items: center; gap: 12px;">
          <div class="iso-cube-container" style="width: 24px; height: 24px;">
            <div class="iso-cube">
              <div class="cube-face front"></div>
              <div class="cube-face back"></div>
              <div class="cube-face right"></div>
              <div class="cube-face left"></div>
              <div class="cube-face top"></div>
              <div class="cube-face bottom"></div>
            </div>
          </div>
          <span class="gateway-text" style="font-size: 12px; line-height: 1;">POWERED_BY_GATEWAY.FM</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="addNetworkBtn" class="btn-connect" style="display:none;">Add Network</button>
        <button id="connectBtn" class="btn-connect">
          <span class="status-led"></span>
          <span id="connectText">CONNECT [ ]</span>
        </button>
      </div>
    </header>

    <!-- Main Stage -->
    <main class="main-stage">

      <!-- Notification/Warning Banner -->
      <div id="chainWarning"
        style="display:none; border: 1px solid var(--c-alert); color: var(--c-alert); padding: 12px; font-family: 'JetBrains Mono'; font-size: 12px; text-transform: uppercase;">
        ⚠ WRONG_NETWORK // SWITCH_TO_SEPOLIA
      </div>

      <!-- Hero -->
      <div class="hero-section">
        <h1 class="text-display glitch-hover" id="heroTitle" data-text="DEPOSIT&nbsp;ETH">DEPOSIT<br>ETH</h1>
        <p class="text-mono" style="margin-top: 16px; opacity: 0.6;">L1 [ETH] -> MIDEN [ZK]</p>
      </div>

      <!-- Form Assembly -->
      <div class="form-assembly">

        <!-- Recipient Input -->
        <div class="input-assembly" style="margin-bottom: 48px;">
          <label for="recipient" class="assembly-label">01 // RECIPIENT_ID [HEX]</label>
          <input id="recipient" type="text" class="text-mono"
            style="width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid var(--c-aluminum); outline: none; font-size: 16px; color: var(--c-ink);"
            placeholder="0x..." spellcheck="false" autocomplete="off">
        </div>

        <!-- Amount Input (The Calculator) -->
        <div class="input-assembly">
          <label for="amount" class="assembly-label">02 // AMOUNT [ETH]</label>
          <input id="amount" type="text" class="amount-display" placeholder="0.00" inputmode="decimal"
            autocomplete="off">
          <div style="display: flex; justify-content: space-between; margin-top: 8px;">
            <span class="text-mono" style="font-size: 10px; opacity: 0.5;">AVAIL: <span id="balanceDisplay">--</span>
              ETH</span>
            <span class="text-mono" style="font-size: 10px; color: var(--c-alert); display: none;"
              id="amountError">INSUFFICIENT_FUNDS</span>
          </div>
        </div>

        <!-- Action -->
        <button id="depositBtn" class="trigger-btn" disabled>
          <span>INITIATE_BRIDGE</span>
          <span>&rarr;</span>
        </button>

      </div>

      <!-- The Receipt (Status) -->
      <div id="status" class="receipt-feed hidden" style="display: none;">
        <!-- JS will populate this -->
      </div>

    </main>

    <!-- Tech Footer (Marquee) -->
    <!-- Footer Removed -->
    <!-- <footer class="footer-tech text-mono marquee-container"> ... </footer> -->

  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
