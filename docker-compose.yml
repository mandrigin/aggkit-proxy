services:
  # PostgreSQL database for Miden client state
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: miden
      POSTGRES_PASSWORD: miden
      POSTGRES_DB: miden_proxy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miden"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Miden node (agglayer-v0.1 - built from source)
  miden-node:
    image: miden-infra/miden-node
    build:
      context: .
      dockerfile: Dockerfile.miden-node
    ports:
      - "57291:57291"
    volumes:
      - miden_node_data:/data
      - miden_node_accounts:/accounts
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 57291 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # L1 devnet (Anvil - Ethereum local chain)
  l1-anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "1"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Bridge service (AggLayer bridge interface)
  bridge-service:
    image: ghcr.io/0xpolygonmiden/bridge-service:latest
    environment:
      DATABASE_URL: postgres://miden:miden@postgres:5432/miden_proxy
      MIDEN_RPC_URL: http://miden-node:57291
      L1_RPC_URL: http://l1-anvil:8545
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      miden-node:
        condition: service_healthy
      l1-anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The proxy service
  proxy:
    image: miden-infra/miden-proxy
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MIDEN_RPC_URL: http://miden-node:57291
      BRIDGE_SERVICE_URL: http://bridge-service:8080
      L1_RPC_URL: http://l1-anvil:8545
      DATABASE_URL: postgres://miden:miden@postgres:5432/miden_proxy
      RUST_LOG: info
      BRIDGE_FAUCET_ID: ${BRIDGE_FAUCET_ID:-}
    ports:
      - "8546:8546"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      miden-node:
        condition: service_healthy
      bridge-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8546/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bridge Web UI (deposit ETH from L1 to Miden)
  bridge-ui:
    image: miden-infra/bridge-ui
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    environment:
      BRIDGE_ADDRESS: ${BRIDGE_ADDRESS:-0xc8cbebf950b9df44d987c8619f092bea980ff038}
    ports:
      - "3000:80"
    depends_on:
      l1-anvil:
        condition: service_healthy

  # Test runner container
  test-runner:
    image: miden-infra/miden-test-runner
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      PROXY_URL: http://proxy:8546
      MIDEN_RPC_URL: http://miden-node:57291
      BRIDGE_SERVICE_URL: http://bridge-service:8080
      L1_RPC_URL: http://l1-anvil:8545
      DATABASE_URL: postgres://miden:miden@postgres:5432/miden_proxy
      RUST_LOG: debug
    depends_on:
      proxy:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
  miden_node_data:
  miden_node_accounts:

networks:
  default:
    name: miden-proxy-network
