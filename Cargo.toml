[package]
name = "miden-eth-proxy"
version = "0.1.0"
edition = "2021"
description = "Ethereum JSON-RPC proxy for Miden bridge operations"

[dependencies]
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["time", "sync"] }

[dev-dependencies]
tokio = { version = "1.0", features = ["rt", "macros"] }
