[package]
name = "miden-rpc-proxy"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
description = "JSON-RPC proxy server bridging Ethereum-style RPC to Miden network"
license = "MIT"

[dependencies]
# RPC server
jsonrpsee = { version = "0.26", features = ["server", "macros"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP middleware
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }

# Ethereum types
alloy-primitives = "0.8"
alloy-rlp = "0.3"
alloy-rpc-types = "0.8"
alloy-consensus = "0.8"

# Miden client (from agglayer-v0.1 tag - not published on crates.io)
miden-client = { git = "https://github.com/0xMiden/miden-base", tag = "agglayer-v0.1", features = ["tonic", "testing"] }
miden-objects = { git = "https://github.com/0xMiden/miden-base", tag = "agglayer-v0.1" }
miden-lib = { git = "https://github.com/0xMiden/miden-base", tag = "agglayer-v0.1" }
miden-tx = { git = "https://github.com/0xMiden/miden-base", tag = "agglayer-v0.1" }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
hex = "0.4"

# Error handling and logging
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
lto = true
codegen-units = 1
