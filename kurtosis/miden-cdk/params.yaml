# Miden-CDK Default Parameters
#
# This file configures the Miden bridge infrastructure deployment.
#
# Usage:
#   kurtosis run . --args-file params.yaml --enclave miden-cdk
#
# Or with overrides:
#   kurtosis run . --args-file params.yaml --enclave miden-cdk \
#     --arg "miden.miden_proxy_image=my-registry/miden-proxy:latest"

# Deployment stages - control which components to deploy
deployment_stages:
  # Deploy local L1 (Ethereum devnet)
  deploy_l1: true

  # Deploy agglayer contracts on L1
  deploy_agglayer_contracts_on_l1: true

  # Deploy databases (PostgreSQL for bridge)
  deploy_databases: true

  # Deploy agglayer service
  deploy_agglayer: true

  # DISABLED: We use Miden instead of OP-Geth
  deploy_cdk_central_environment: false
  deploy_cdk_bridge_infra: false  # We deploy custom bridge config
  deploy_op_succinct: false
  deploy_l2_contracts: false
  deploy_aggkit_node: false

# Miden-specific configuration
miden:
  # L1-snapshot-only: skip the L2 miden node/proxy + bridge services so fixture
  # generation needs no miden-infra images. Flip to true (or drop) for a full
  # in-kurtosis stack. main.star gates Steps 2-3 on this.
  deploy_miden_services: false
  # Miden network ID (assigned by Agglayer)
  miden_network_id: 2
  miden_chain_id: 2

  # Miden node image
  # Build with: docker build -t miden-infra/miden-node:agglayer-v0.1 -f Dockerfile.miden-node .
  miden_node_image: "miden-infra/miden-node:agglayer-v0.1"
  miden_node_port: 57291

  # Miden RPC proxy image (miden-agglayer)
  # Build with: docker build https://github.com/gateway-fm/miden-agglayer.git#feat/l2-l1 -t miden-infra/miden-proxy:latest
  miden_proxy_image: "miden-infra/miden-proxy:latest"
  miden_proxy_port: 8546

  # Deploy web UI for sending deposits (bridge ETH from L1 to Miden)
  deploy_web_ui: true

  # Deploy pgweb for browsing bridge database
  deploy_pgweb: true
  pgweb_port: 8082

# kurtosis-cdk configuration (passed through)
args:
  # L1 configuration
  l1_engine: "ethereum-package"
  l1_chain_id: 271828
  l1_preset: "minimal"
  l1_seconds_per_slot: 2
  l1_funding_amount: "1000000ether"
  l1_participants_count: 1

  # L2 configuration (Miden network)
  l2_chain_id: 2
  l2_network_id: 2
  l2_keystore_password: "pSnv6Dh5s9ahuzGzH9RoCDrKAMddaX3m"

  # Deployment suffix
  deployment_suffix: "-001"

  # Log level
  log_level: "info"
  log_format: "pretty"

  # Images (can be overridden)
  # zkevm_bridge_service_image: "hermeznetwork/zkevm-bridge-service:v0.6.0-RC1"

  # RD-862: locally-built aggkit with UseUpdateExitRoot mode. Once
  # agglayer/aggkit#1597 is merged + a tagged release ships, switch back
  # to a public tag (e.g. ghcr.io/agglayer/aggkit:NEXT). This image must
  # be present in the local docker daemon — built via `docker build .` in
  # /Users/max/github/work/gateway/miden/aggkit on branch
  # rd-862/update-exit-root-mode.
  aggkit_image: "miden-agglayer/aggkit:rd-862"

  # Agglayer configuration
  agglayer_prover_primary_prover: "mock-prover"

  # Additional services (optional)
  additional_services: []
